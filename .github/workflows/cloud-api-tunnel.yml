name: Cloud API (tunnel)

# Fallback when Cloudflare Worker secrets are not set.
# Publishes a Quick Tunnel URL (~4h) via GitHub Contents API (no git push conflicts).

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */3 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/cloud-api-server.mjs'
      - 'scripts/publish-cloud-api-url.mjs'
      - 'scripts/extract-tunnel-url.mjs'
      - '.github/workflows/cloud-api-tunnel.yml'

concurrency:
  group: cloud-api-tunnel
  cancel-in-progress: false

jobs:
  api:
    # Skip when durable Worker deploy is configured (Worker workflow handles permanent URL)
    if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start API server
        env:
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PORT: '8787'
          ALLOWED_ORIGINS: 'https://nezumi0627.github.io,http://localhost:3000,http://127.0.0.1:3000'
        run: |
          set +e
          node scripts/cloud-api-server.mjs > /tmp/cloud-api.log 2>&1 &
          echo $! > /tmp/cloud-api.pid
          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:8787/health" >/dev/null 2>&1; then
              echo "API ready (${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/cloud-api.log
          exit 1

      - name: Install cloudflared
        run: |
          curl -fsSL -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start quick tunnel
        id: tunnel
        run: |
          cloudflared tunnel --url http://127.0.0.1:8787 > /tmp/cloudflared.log 2>&1 &
          echo $! > /tmp/cloudflared.pid
          for i in $(seq 1 90); do
            if URL=$(node scripts/extract-tunnel-url.mjs /tmp/cloudflared.log 2>/dev/null); then
              echo "tunnel-url=$URL" >> "$GITHUB_OUTPUT"
              echo "Public API: $URL"
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/cloudflared.pid)" 2>/dev/null; then
              echo "cloudflared exited"
              cat /tmp/cloudflared.log
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for tunnel URL"
          cat /tmp/cloudflared.log
          exit 1

      - name: Publish API URL
        env:
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          API_URL: ${{ steps.tunnel.outputs.tunnel-url }}
          API_SOURCE: actions-tunnel
        run: node scripts/publish-cloud-api-url.mjs

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "Deploy GitHub Pages" --ref main || true

      - name: Cancel previous tunnel runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${{ github.run_id }}"
          gh api "repos/${{ github.repository }}/actions/workflows/cloud-api-tunnel.yml/runs?status=in_progress&per_page=10" \
            --jq '.workflow_runs[] | select(.id != '"$CURRENT"') | .id' \
            | while read -r id; do
                echo "Cancelling old run $id"
                gh api -X POST "repos/${{ github.repository }}/actions/runs/$id/cancel" || true
              done

      - name: Keep tunnel alive
        run: |
          echo "Keeping cloud API alive until job timeout…"
          while kill -0 "$(cat /tmp/cloud-api.pid)" 2>/dev/null && kill -0 "$(cat /tmp/cloudflared.pid)" 2>/dev/null; do
            sleep 60
            curl -fsS "http://127.0.0.1:8787/health" >/dev/null || exit 1
          done
          echo "Process exited early"
          cat /tmp/cloud-api.log || true
          cat /tmp/cloudflared.log || true
          exit 1
