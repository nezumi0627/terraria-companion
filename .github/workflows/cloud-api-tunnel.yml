name: Cloud API (tunnel)

# Temporary URL loop: Quick Tunnel → push cloud-api-url.json → keep alive → rotate before expiry.
# Client reads main/public/cloud-api-url.json (raw.githubusercontent.com) and re-fetches when dead.

on:
  workflow_dispatch:
  schedule:
    # Rotate every 2h (tunnel ~4–5h); overlap with previous run until new URL is live
    - cron: '30 */2 * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/cloud-api-server.mjs'
      - 'scripts/publish-cloud-api-url.mjs'
      - 'scripts/extract-tunnel-url.mjs'
      - 'scripts/probe-cloud-api-health.mjs'
      - '.github/workflows/cloud-api-tunnel.yml'

concurrency:
  group: cloud-api-tunnel
  cancel-in-progress: false

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 290
    permissions:
      contents: write
      actions: write
    env:
      TUNNEL_URL: ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start API server
        env:
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PORT: '8787'
          ALLOWED_ORIGINS: 'https://nezumi0627.github.io,http://localhost:3000,http://127.0.0.1:3000'
        run: |
          set +e
          node scripts/cloud-api-server.mjs > /tmp/cloud-api.log 2>&1 &
          echo $! > /tmp/cloud-api.pid
          for i in $(seq 1 45); do
            if curl -fsS "http://127.0.0.1:8787/health" >/dev/null 2>&1; then
              echo "API ready (${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/cloud-api.log
          exit 1

      - name: Install cloudflared
        run: |
          curl -fsSL -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start quick tunnel
        id: tunnel
        run: |
          cloudflared tunnel --url http://127.0.0.1:8787 > /tmp/cloudflared.log 2>&1 &
          echo $! > /tmp/cloudflared.pid
          for i in $(seq 1 90); do
            if URL=$(node scripts/extract-tunnel-url.mjs /tmp/cloudflared.log 2>/dev/null); then
              echo "tunnel-url=$URL" >> "$GITHUB_OUTPUT"
              echo "Public API: $URL"
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/cloudflared.pid)" 2>/dev/null; then
              echo "cloudflared exited"
              cat /tmp/cloudflared.log
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for tunnel URL"
          cat /tmp/cloudflared.log
          exit 1

      - name: Verify tunnel health (public)
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel-url }}
        run: |
          for i in $(seq 1 20); do
            if node scripts/probe-cloud-api-health.mjs "$TUNNEL_URL"; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Publish API URL to main
        env:
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          API_URL: ${{ steps.tunnel.outputs.tunnel-url }}
          API_SOURCE: actions-tunnel
          API_EXPIRES_MS: '12600000'
        run: node scripts/publish-cloud-api-url.mjs

      - name: Cancel previous tunnel runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT="${{ github.run_id }}"
          gh api "repos/${{ github.repository }}/actions/workflows/cloud-api-tunnel.yml/runs?status=in_progress&per_page=10" \
            --jq '.workflow_runs[] | select(.id != '"$CURRENT"') | .id' \
            | while read -r id; do
                echo "Cancelling old run $id"
                gh api -X POST "repos/${{ github.repository }}/actions/runs/$id/cancel" || true
              done

      - name: Keep tunnel alive (rotate when public URL dies)
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.tunnel-url }}
        run: |
          echo "Keeping cloud API alive; will enqueue rotation if public URL fails…"
          FAILS=0
          while kill -0 "$(cat /tmp/cloud-api.pid)" 2>/dev/null && kill -0 "$(cat /tmp/cloudflared.pid)" 2>/dev/null; do
            sleep 60
            if ! curl -fsS "http://127.0.0.1:8787/health" >/dev/null 2>&1; then
              echo "Local API unhealthy"
              exit 1
            fi
            if node scripts/probe-cloud-api-health.mjs "$TUNNEL_URL" 2>/dev/null; then
              FAILS=0
            else
              FAILS=$((FAILS + 1))
              echo "Public tunnel probe failed ($FAILS/3)"
              if [ "$FAILS" -ge 3 ]; then
                echo "Tunnel expired — ending run to rotate"
                exit 1
              fi
            fi
          done
          echo "Process exited early"
          cat /tmp/cloud-api.log || true
          cat /tmp/cloudflared.log || true
          exit 1

      - name: Enqueue next tunnel (rotation loop)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IN_PROGRESS=$(gh api "repos/${{ github.repository }}/actions/workflows/cloud-api-tunnel.yml/runs?status=in_progress&per_page=5" --jq 'length')
          if [ "$IN_PROGRESS" -gt 1 ]; then
            echo "Another tunnel run already in progress ($IN_PROGRESS), skip enqueue"
            exit 0
          fi
          echo "Enqueueing fresh tunnel workflow…"
          gh workflow run "Cloud API (tunnel)" --ref main
