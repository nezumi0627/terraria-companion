name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'users/**'
      - 'workers/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          # Durable Worker URL only. Ephemeral trycloudflare.com must NOT be baked in —
          # the client discovers tunnel URLs from public/cloud-api-url.json at runtime.
          NEXT_PUBLIC_CLOUD_API_URL: ${{ vars.CLOUD_API_URL }}
          NEXT_PUBLIC_GITHUB_REPO: ${{ github.repository }}
        run: |
          URL="${NEXT_PUBLIC_CLOUD_API_URL:-}"
          if echo "$URL" | grep -qi 'trycloudflare\.com'; then
            echo "Ignoring ephemeral tunnel URL in CLOUD_API_URL (use Worker URL or leave empty)"
            unset NEXT_PUBLIC_CLOUD_API_URL
            export NEXT_PUBLIC_CLOUD_API_URL=
          fi
          pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
