name: Deploy Cloud API (Cloudflare Worker)

# Permanent API: deploy Worker → publish workers.dev URL → rebuild Pages with CLOUD_API_URL.
# Requires repo Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUD_API_GITHUB_TOKEN

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy Worker
        id: deploy
        working-directory: workers/cloud-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
        run: |
          set -e
          LOG=/tmp/wrangler-deploy.log
          wrangler deploy 2>&1 | tee "$LOG"
          printf '%s' "$GH_TOKEN" | wrangler secret put GH_TOKEN --name terraria-companion-api
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' "$LOG" | head -n1 || true)
          if [ -z "$URL" ]; then
            URL=$(wrangler deployments list --name terraria-companion-api 2>/dev/null | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -n1 || true)
          fi
          if [ -z "$URL" ]; then
            echo "Could not detect workers.dev URL"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Worker URL: $URL"

      - name: Publish durable API URL
        env:
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          API_URL: ${{ steps.deploy.outputs.url }}
          API_SOURCE: workers-dev
        run: node scripts/publish-cloud-api-url.mjs

      - name: Trigger Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "Deploy GitHub Pages" --ref main || true

  skip-hint:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID が未設定のため Worker デプロイをスキップします。"
          echo "フォールバック: Cloud API (tunnel) ワークフローが Quick Tunnel を張ります。"
