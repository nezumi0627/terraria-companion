name: Deploy Cloud API (Cloudflare Worker)

on:
  push:
    branches: [main]
    paths:
      - 'workers/cloud-api/**'
      - '.github/workflows/deploy-cloud-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/cloud-api
          command: deploy
          secrets: |
            GH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.CLOUD_API_GITHUB_TOKEN }}
